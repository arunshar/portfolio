<svg viewBox="0 0 920 300" xmlns="http://www.w3.org/2000/svg" width="100%" role="img" aria-label="GeoSAM-3D data flow">
    <style>
svg{--bg:#fbfcfe;--panel:#fff;--ink:#16202c;--mut:#5b6776;--line:#e6eaf0;--acc:#2257d6;--acc2:#0e9f6e;--warn:#b45309;--chip:#eef2f9;--code:#f3f5f9;}

      .b{fill:var(--panel);stroke:var(--line);stroke-width:1.5;rx:10}
      .t{font-family:Montserrat;font-size:13px;fill:var(--ink)}
      .s{font-family:'Noto Sans';font-size:11px;fill:var(--mut)}
      .real{stroke:var(--acc2);stroke-width:2}
      .stub{stroke:var(--warn);stroke-dasharray:5 4;stroke-width:2}
      .ar{stroke:var(--mut);stroke-width:1.6;fill:none;marker-end:url(#a)}
    </style>
    <defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="var(--mut)"/></marker></defs>
    <rect class="b stub" x="10" y="20" width="180" height="56" rx="10"/><text class="t" x="22" y="44">MonoGS + Depth Anything</text><text class="s" x="22" y="62">phone video to 3D Gaussians (stub)</text>
    <rect class="b stub" x="10" y="120" width="180" height="56" rx="10"/><text class="t" x="22" y="144">SAM 2 video masks</text><text class="s" x="22" y="162">project + vote (stub)</text>
    <rect class="b real" x="270" y="70" width="190" height="56" rx="10"/><text class="t" x="284" y="94">Gaussian feature head</text><text class="s" x="284" y="112">InfoNCE, 32-d, trained</text>
    <rect class="b real" x="540" y="70" width="200" height="56" rx="10"/><text class="t" x="554" y="94">Heat geodesic kernel</text><text class="s" x="554" y="112">Varadhan distance (real)</text>
    <rect class="b" x="800" y="70" width="110" height="56" rx="10"/><text class="t" x="816" y="100">3D mask</text>
    <path class="ar" d="M190,48 C230,48 240,92 268,96"/>
    <path class="ar" d="M190,148 C230,148 240,104 268,100"/>
    <path class="ar" d="M460,98 L538,98"/>
    <path class="ar" d="M740,98 L798,98"/>
    <text class="s" x="300" y="210">click a point to seed Gaussians, diffuse heat, read geodesic distance, propagate the label</text>
    <text class="s" x="300" y="232" style="fill:var(--acc2)">green = real and tested &middot; dashed amber = off-the-shelf model, stubbed in this repo</text>
  </svg>