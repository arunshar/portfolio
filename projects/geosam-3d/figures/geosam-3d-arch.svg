tl" x="837" y="274" text-anchor="middle">Heat-method geodesic kernel</text><text class="sub" x="837" y="292" text-anchor="middle">Varadhan distance, fixes occlusion leak</text><rect x="28" y="344" width="1064" height="84" rx="12" fill="#fff6e6" stroke="#e7b66a" stroke-width="1.5"/><text x="48" y="372" style="font-size:15px;font-weight:700;fill:#0e1117;font-family:Montserrat,sans-serif">Honest scope</text><text x="48" y="394" class="sub">Feature head + heat-geodesic kernel are real and verified (21 unit tests, synthetic-occlusion checks).</text><text x="48" y="414" class="sub">MonoGS / Depth-Anything / SAM 2 are off-the-shelf front-ends; ScanNet / Replica benchmarks are the next step (target).</text><text class="lg" x="28" y="452" fill="#0f766e">green = real and tested</text><text class="lg" x="228" y="452" fill="#b45309">dashed amber = off-the-shelf / target</text><text class="lg" x="498" y="452" fill="#1772d0">blue = learned / core method</text></svg>
