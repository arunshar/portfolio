<svg viewBox="0 0 1120 530" width="100%" role="img" aria-label="GeoTrace-Agent framework">
        <defs>
          <marker id="ah" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 z" fill="#202733"/></marker>
        </defs>
        <style>
svg{--bg:#fbfcfe;--panel:#fff;--ink:#16202c;--mut:#5b6776;--line:#e6eaf0;--acc:#2257d6;--acc2:#0e9f6e;--warn:#b45309;--chip:#eef2f9;--code:#f3f5f9;}

          .box{ fill:#fff; stroke:#aebbd0; stroke-width:1.5; }
          .acc{ fill:#eaf3fd; stroke:#1772d0; }
          .grn{ fill:#e6f7ed; stroke:#0f766e; }
          .lane{ fill:#f3f6fc; stroke:#aebbd0; stroke-width:1.5; }
          .ttl{ font-size:16px; font-weight:700; fill:#0e1117; }
          .sub{ font-size:12.5px; font-weight:500; fill:#1b2230; }
          .ar{ stroke:#202733; stroke-width:2.2; fill:none; marker-end:url(#ah); }
        </style>

        <!-- top spine -->
        <rect class="box" x="24" y="44" width="180" height="88" rx="11"/>
        <text class="ttl" x="114" y="84" text-anchor="middle">NL question</text>
        <text class="sub" x="114" y="104" text-anchor="middle">+ anchors, budget</text>

        <rect class="box acc" x="250" y="44" width="224" height="88" rx="11"/>
        <text class="ttl" x="362" y="80" text-anchor="middle">PlannerAgent</text>
        <text class="sub" x="362" y="100" text-anchor="middle">typed PlanGraph</text>
        <text class="sub" x="362" y="117" text-anchor="middle">(statically-validated DAG)</text>

        <rect class="box" x="520" y="44" width="224" height="88" rx="11"/>
        <text class="ttl" x="632" y="80" text-anchor="middle">Orchestrator</text>
        <text class="sub" x="632" y="100" text-anchor="middle">parallel topo layers</text>
        <text class="sub" x="632" y="117" text-anchor="middle">hard token / tool / time budget</text>

        <rect class="box" x="916" y="44" width="180" height="88" rx="11"/>
        <text class="ttl" x="1006" y="84" text-anchor="middle">Response</text>
        <text class="sub" x="1006" y="104" text-anchor="middle">answer, regions,</text>
        <text class="sub" x="1006" y="121" text-anchor="middle">trace_id, cost</text>

        <!-- spine arrows (straight, horizontal) -->
        <line class="ar" x1="204" y1="88" x2="246" y2="88"/>
        <line class="ar" x1="474" y1="88" x2="516" y2="88"/>
        <line class="ar" x1="744" y1="88" x2="912" y2="88"/>
        <text class="sub" x="828" y="78" text-anchor="middle">summarize + output filter</text>

        <!-- orchestrator fan-out bus (straight, orthogonal) -->
        <line x1="632" y1="132" x2="632" y2="176" stroke="#202733" stroke-width="2.2"/>
        <line x1="155" y1="176" x2="965" y2="176" stroke="#202733" stroke-width="2.2"/>
        <line class="ar" x1="155" y1="176" x2="155" y2="210"/>
        <line class="ar" x1="425" y1="176" x2="425" y2="210"/>
        <line class="ar" x1="695" y1="176" x2="695" y2="210"/>
        <line class="ar" x1="965" y1="176" x2="965" y2="210"/>

        <!-- agents row -->
        <rect class="box" x="30" y="212" width="250" height="84" rx="10"/>
        <text class="ttl" x="155" y="248" text-anchor="middle">SpaceTimeReasoner</text>
        <text class="sub" x="155" y="268" text-anchor="middle">prism / geo-ellipse / MOBR</text>

        <rect class="box" x="300" y="212" width="250" height="84" rx="10"/>
        <text class="ttl" x="425" y="248" text-anchor="middle">GapDetector</text>
        <text class="sub" x="425" y="268" text-anchor="middle">STAGD-DRM + AGM</text>

        <rect class="box" x="570" y="212" width="250" height="84" rx="10"/>
        <text class="ttl" x="695" y="248" text-anchor="middle">RendezvousFinder</text>
        <text class="sub" x="695" y="268" text-anchor="middle">TGARD / DC-TGARD</text>

        <rect class="box grn" x="840" y="212" width="250" height="84" rx="10"/>
        <text class="ttl" x="965" y="248" text-anchor="middle">Validator</text>
        <text class="sub" x="965" y="268" text-anchor="middle">kinematic feasibility gate</text>

        <!-- agents to kernel (straight vertical) -->
        <line class="ar" x1="155" y1="296" x2="155" y2="338"/>
        <line class="ar" x1="425" y1="296" x2="425" y2="338"/>
        <line class="ar" x1="695" y1="296" x2="695" y2="338"/>
        <line class="ar" x1="965" y1="296" x2="965" y2="338"/>

        <!-- prism kernel lane -->
        <rect class="lane" x="30" y="340" width="1060" height="50" rx="10"/>
        <text class="ttl" x="560" y="362" text-anchor="middle">Deterministic prism kernel</text>
        <text class="sub" x="560" y="380" text-anchor="middle">geo-ellipses &middot; minimum bounding rectangles &middot; dynamic region merge &middot; exposed as an MCP server</text>

        <!-- eval & observability band -->
        <rect x="24" y="408" width="1072" height="96" rx="12" fill="#fff6e6" stroke="#e7b66a" stroke-width="1.5"/>
        <text x="48" y="438" style="font-size:16px;font-weight:700;fill:#0e1117">Evaluation &amp; Observability  (instruments every stage)</text>
        <text x="48" y="464" class="sub">OpenTelemetry traces, tail-sampled &nbsp;&middot;&nbsp; per-stage cost ledger &nbsp;&middot;&nbsp; golden-set offline harness with a CI gate</text>
        <text x="48" y="486" class="sub">online drift monitor on live traffic &nbsp;&middot;&nbsp; human-in-the-loop (HITL) review queue, exports preference data to Pi-GRPO</text>
      </svg>