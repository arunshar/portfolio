<svg viewBox="0 0 920 200" xmlns="http://www.w3.org/2000/svg" width="100%" role="img" aria-label="MapFix pipeline">
    <style>
svg{--bg:#fbfcfe;--panel:#fff;--ink:#16202c;--mut:#5b6776;--line:#e6eaf0;--acc:#2257d6;--acc2:#0e9f6e;--warn:#b45309;--chip:#eef2f9;--code:#f3f5f9;}
.b{fill:var(--panel);stroke:var(--line);stroke-width:1.5}.t{font-family:Montserrat;font-size:12.5px;fill:var(--ink)}.s{font-family:'Noto Sans';font-size:10.5px;fill:var(--mut)}.ar{stroke:var(--mut);stroke-width:1.6;fill:none;marker-end:url(#a)}</style>
    <defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="var(--mut)"/></marker></defs>
    <rect class="b" x="8" y="60" width="150" height="50" rx="10"/><text class="t" x="20" y="82">input points</text><text class="s" x="20" y="100">normalize to [0,1]</text>
    <rect class="b" x="200" y="60" width="170" height="50" rx="10"/><text class="t" x="212" y="82">apply distortion</text><text class="s" x="212" y="100">synthetic warp (curve/shear)</text>
    <rect class="b" x="412" y="60" width="190" height="50" rx="10"/><text class="t" x="424" y="82">fixed-point correct</text><text class="s" x="424" y="100">estimate &larr; raw - D(estimate)</text>
    <rect class="b" x="644" y="60" width="160" height="50" rx="10"/><text class="t" x="656" y="82">metrics</text><text class="s" x="656" y="100">residual px, % area recovered</text>
    <rect class="b" x="372" y="140" width="230" height="44" rx="10" style="stroke-dasharray:5 4;stroke:var(--warn)"/><text class="s" x="384" y="167" style="fill:var(--warn)">optional LLM narration + rendered preview</text>
    <path class="ar" d="M158,85 L198,85"/><path class="ar" d="M370,85 L410,85"/><path class="ar" d="M602,85 L642,85"/><path class="ar" d="M500,110 L490,138"/>
  </svg>