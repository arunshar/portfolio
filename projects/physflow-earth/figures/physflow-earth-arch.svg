<svg viewBox="0 0 920 300" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PhysFlow-Earth architecture"><style>
.b{fill:#fff;stroke:#e6eaf0;stroke-width:1.5}
.t{font-family:Montserrat,system-ui,sans-serif;font-size:13px;fill:#16202c}
.s{font-family:'Noto Sans',system-ui,sans-serif;font-size:10.5px;fill:#5b6776}
.real{stroke:#0e9f6e;stroke-width:2}
.stub{stroke:#b45309;stroke-dasharray:5 4;stroke-width:2}
.ar{stroke:#5b6776;stroke-width:1.6;fill:none;marker-end:url(#a)}
.lg{font-family:'Noto Sans',system-ui,sans-serif;font-size:10.5px}
</style>
<defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#5b6776"/></marker></defs>
<rect class="b" x="10" y="56" width="170" height="56" rx="10"/><text class="t" x="22" y="79">Low-res field</text><text class="s" x="22" y="97">imagery / climate (ERA5, S2)</text>
<rect class="b real" x="240" y="56" width="200" height="56" rx="10"/><text class="t" x="252" y="79">DiT velocity</text><text class="s" x="252" y="97">rectified flow, forward verified</text>
<rect class="b real" x="500" y="56" width="220" height="56" rx="10"/><text class="t" x="512" y="79">Physics residual penalty</text><text class="s" x="512" y="97">mass / divergence / band-ratio</text>
<rect class="b" x="780" y="56" width="130" height="56" rx="10"/><text class="t" x="792" y="80">Sharp output</text>
<path class="ar" d="M180,84 L238,84"/>
<path class="ar" d="M440,84 L498,84"/>
<path class="ar" d="M720,84 L778,84"/>
<path class="ar" d="M610,112 C610,140 480,150 380,150 C300,150 250,120 340,114" style="stroke-dasharray:4 3"/>
<text class="s" x="360" y="154">penalty keeps invented detail physically consistent (8/8 physics + flow tests)</text>
<text class="s" x="240" y="184">trained checkpoints and PSNR 28.6 vs EDiffSR are scaffold / targets</text>
<text class="lg" x="14" y="288" fill="#0e9f6e">green = real and tested</text><text class="lg" x="210" y="288" fill="#b45309">dashed amber = stub / target (off-the-shelf or roadmap)</text></svg>
