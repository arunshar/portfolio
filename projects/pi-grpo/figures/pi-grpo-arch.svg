<svg viewBox="0 0 920 300" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pi-GRPO architecture"><style>
.b{fill:#fff;stroke:#e6eaf0;stroke-width:1.5}
.t{font-family:Montserrat,system-ui,sans-serif;font-size:13px;fill:#16202c}
.s{font-family:'Noto Sans',system-ui,sans-serif;font-size:10.5px;fill:#5b6776}
.real{stroke:#0e9f6e;stroke-width:2}
.stub{stroke:#b45309;stroke-dasharray:5 4;stroke-width:2}
.ar{stroke:#5b6776;stroke-width:1.6;fill:none;marker-end:url(#a)}
.lg{font-family:'Noto Sans',system-ui,sans-serif;font-size:10.5px}
</style>
<defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#5b6776"/></marker></defs>
<rect class="b real" x="20" y="70" width="160" height="56" rx="10"/><text class="t" x="32" y="93">Trajectory policy</text><text class="s" x="32" y="111">PPO / DPO / GRPO</text>
<rect class="b" x="250" y="70" width="150" height="56" rx="10"/><text class="t" x="262" y="100">Rollouts</text>
<rect class="b real" x="470" y="44" width="230" height="58" rx="10"/><text class="t" x="482" y="67">Reward = task + physics floor</text><text class="s" x="482" y="85">hard constraints as a reward floor</text>
<rect class="b" x="470" y="128" width="230" height="46" rx="10" style="stroke-dasharray:4 3"/><text class="s" x="482" y="156">cuts hard-constraint violations (paper result)</text>
<rect class="b" x="760" y="70" width="140" height="56" rx="10"/><text class="t" x="772" y="100">Policy update</text>
<path class="ar" d="M180,98 L248,98"/>
<path class="ar" d="M400,90 C430,90 445,75 468,74"/>
<path class="ar" d="M700,74 C730,74 740,92 758,96"/>
<path class="ar" d="M830,126 C830,210 300,210 250,128" style="stroke-dasharray:4 3"/><text class="s" x="420" y="206">policy-improvement loop</text>
<text class="s" x="20" y="250">physics-informed RL stack (code real); headline violation reduction is the workshop paper's reported result</text>
<text class="lg" x="14" y="288" fill="#0e9f6e">green = real and tested</text><text class="lg" x="210" y="288" fill="#b45309">dashed amber = stub / target (off-the-shelf or roadmap)</text></svg>
