<svg viewBox="0 0 960 300" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pin-Service serving pipeline"><style>
.b{fill:#fff;stroke:#e6eaf0;stroke-width:1.5}
.t{font-family:Montserrat,system-ui,sans-serif;font-size:13px;fill:#16202c}
.s{font-family:'Noto Sans',system-ui,sans-serif;font-size:10.5px;fill:#5b6776}
.real{stroke:#0e9f6e;stroke-width:2}
.stub{stroke:#b45309;stroke-dasharray:5 4;stroke-width:2}
.ar{stroke:#5b6776;stroke-width:1.6;fill:none;marker-end:url(#a)}
.lg{font-family:'Noto Sans',system-ui,sans-serif;font-size:10.5px}
</style>
<defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#5b6776"/></marker></defs>
<rect class="b" x="6" y="60" width="120" height="50" rx="10"/><text class="t" x="18" y="90">Request</text>
<rect class="b real" x="146" y="60" width="140" height="50" rx="10"/><text class="t" x="158" y="83">Candidate gen</text><text class="s" x="158" y="100">map-snapped pins</text>
<rect class="b real" x="306" y="60" width="140" height="50" rx="10"/><text class="t" x="318" y="83">Constraint filter</text><text class="s" x="318" y="100">legal / drivable</text>
<rect class="b real" x="466" y="60" width="130" height="50" rx="10"/><text class="t" x="478" y="83">ML scoring</text><text class="s" x="478" y="100">GBDT (synthetic label)</text>
<rect class="b real" x="616" y="60" width="150" height="50" rx="10"/><text class="t" x="628" y="83">Congestion re-rank</text><text class="s" x="628" y="100">global coordination</text>
<rect class="b real" x="786" y="60" width="120" height="50" rx="10"/><text class="t" x="798" y="83">Load shed</text><text class="s" x="798" y="100">gRPC response</text>
<path class="ar" d="M126,85 L144,85"/><path class="ar" d="M286,85 L304,85"/><path class="ar" d="M446,85 L464,85"/><path class="ar" d="M596,85 L614,85"/><path class="ar" d="M766,85 L784,85"/>
<rect class="b" x="360" y="150" width="240" height="44" rx="10" style="stroke-dasharray:4 3"/><text class="s" x="372" y="177">observability: traces, metrics, Locust load test</text>
<path class="ar" d="M480,110 L480,148" style="stroke-dasharray:4 3"/>
<text class="s" x="146" y="230">serving pattern is real and tested (17 files, unit + load tests); the scorer model and map/supply data are illustrative</text>
<text class="lg" x="14" y="288" fill="#0e9f6e">green = real and tested</text><text class="lg" x="210" y="288" fill="#b45309">dashed amber = stub / target (off-the-shelf or roadmap)</text></svg>
