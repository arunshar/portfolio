<svg viewBox="0 0 920 300" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="TrajPrompt architecture"><style>
.b{fill:#fff;stroke:#e6eaf0;stroke-width:1.5}
.t{font-family:Montserrat,system-ui,sans-serif;font-size:13px;fill:#16202c}
.s{font-family:'Noto Sans',system-ui,sans-serif;font-size:10.5px;fill:#5b6776}
.real{stroke:#0e9f6e;stroke-width:2}
.stub{stroke:#b45309;stroke-dasharray:5 4;stroke-width:2}
.ar{stroke:#5b6776;stroke-width:1.6;fill:none;marker-end:url(#a)}
.lg{font-family:'Noto Sans',system-ui,sans-serif;font-size:10.5px}
</style>
<defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#5b6776"/></marker></defs>
<rect class="b" x="10" y="20" width="170" height="48" rx="10"/><text class="t" x="22" y="42">Text query</text><text class="s" x="22" y="59">plain English</text>
<rect class="b" x="10" y="96" width="170" height="48" rx="10"/><text class="t" x="22" y="118">AIS trajectories</text><text class="s" x="22" y="135">vessel tracks</text>
<rect class="b real" x="240" y="58" width="200" height="52" rx="10"/><text class="t" x="252" y="80">TrajCLIP encoder</text><text class="s" x="252" y="98">InfoNCE, text-trajectory align</text>
<rect class="b real" x="500" y="58" width="180" height="52" rx="10"/><text class="t" x="512" y="80">TGARD rendezvous</text><text class="s" x="512" y="98">group rendezvous, tested</text>
<rect class="b stub" x="500" y="138" width="180" height="50" rx="10"/><text class="t" x="512" y="160">SAM 2 + Sentinel-2</text><text class="s" x="512" y="178">chip confirm (stub)</text>
<rect class="b" x="740" y="84" width="160" height="52" rx="10"/><text class="t" x="752" y="115">matches on a map</text>
<path class="ar" d="M180,44 C210,44 215,78 238,82"/>
<path class="ar" d="M180,120 C210,120 215,90 238,86"/>
<path class="ar" d="M440,84 L498,84"/>
<path class="ar" d="M590,110 L590,136"/>
<path class="ar" d="M680,90 C710,90 715,108 738,110"/>
<text class="s" x="240" y="214">trained traj-CLIP checkpoint and the AIS-text dataset are scaffold</text>
<text class="lg" x="14" y="288" fill="#0e9f6e">green = real and tested</text><text class="lg" x="210" y="288" fill="#b45309">dashed amber = stub / target (off-the-shelf or roadmap)</text></svg>
